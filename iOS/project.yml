name: DeckCareLog
options:
  bundleIdPrefix: com.shimondeitel.deckcarelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  DeckCareLog:
    type: application
    platform: iOS
    sources:
      - path: DeckCareLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.deckcarelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: DeckCareLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  DeckCareLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DeckCareLogTests
      - path: DeckCareLog.storekit
    dependencies:
      - target: DeckCareLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.deckcarelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  DeckCareLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DeckCareLogUITests
    dependencies:
      - target: DeckCareLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.deckcarelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  DeckCareLog:
    build:
      targets:
        DeckCareLog: all
        DeckCareLogTests: [test]
        DeckCareLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: DeckCareLog.storekit
    test:
      config: Debug
      storeKitConfiguration: DeckCareLog.storekit
      targets:
        - DeckCareLogTests
        - DeckCareLogUITests
    archive:
      config: Release
